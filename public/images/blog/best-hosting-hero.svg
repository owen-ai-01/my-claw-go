<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d0d14" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#27272a" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.4"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="250" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1000" cy="500" r="300" fill="#8b5cf6" opacity="0.05"/>

  <!-- Top badge -->
  <rect x="480" y="60" width="240" height="34" rx="17" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.8"/>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">2026 GUIDE</text>

  <!-- Main headline -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#ffffff">Best OpenClaw Hosting</text>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800">
    <tspan fill="url(#accent)">Providers</tspan>
    <tspan fill="#ffffff"> in 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#71717a" font-weight="400">An honest comparison of managed OpenClaw hosting services</text>

  <!-- Divider line -->
  <rect x="480" y="325" width="240" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Provider cards row -->
  <!-- Card 1: MyClawGo (highlighted) -->
  <rect x="60" y="360" width="190" height="210" rx="16" fill="url(#card1)" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="360" width="190" height="6" rx="3" fill="url(#accent)"/>
  <!-- #1 badge -->
  <circle cx="155" cy="395" r="18" fill="url(#accent)"/>
  <text x="155" y="401" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#ffffff">#1</text>
  <text x="155" y="432" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ffffff">MyClawGo</text>
  <text x="155" y="455" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3b82f6" font-weight="600">BEST OVERALL</text>
  <!-- stars -->
  <text x="155" y="480" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#fbbf24">★★★★★</text>
  <text x="155" y="505" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Multi-Agent · Relay</text>
  <text x="155" y="523" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a78bfa">$29.90/mo</text>
  <text x="155" y="548" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e">✓ Dedicated instance</text>

  <!-- Card 2: MyClaw -->
  <rect x="268" y="370" width="168" height="190" rx="14" fill="url(#card2)" stroke="#27272a" stroke-width="1"/>
  <text x="352" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#71717a">#2</text>
  <text x="352" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">MyClaw</text>
  <text x="352" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#fbbf24">★★★★☆</text>
  <text x="352" y="483" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Single Agent</text>
  <text x="352" y="505" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">$16/mo</text>
  <text x="352" y="530" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Good for beginners</text>
  <text x="352" y="550" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Limited multi-agent</text>

  <!-- Card 3: xCloud -->
  <rect x="452" y="370" width="168" height="190" rx="14" fill="url(#card2)" stroke="#27272a" stroke-width="1"/>
  <text x="536" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#71717a">#3</text>
  <text x="536" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">xCloud</text>
  <text x="536" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#fbbf24">★★★★☆</text>
  <text x="536" y="483" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Dev-Friendly</text>
  <text x="536" y="505" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">$24/mo</text>
  <text x="536" y="530" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">More control</text>
  <text x="536" y="550" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Technical users</text>

  <!-- Card 4: Launch -->
  <rect x="636" y="370" width="168" height="190" rx="14" fill="url(#card2)" stroke="#27272a" stroke-width="1"/>
  <text x="720" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#71717a">#4</text>
  <text x="720" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">OC Launch</text>
  <text x="720" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#fbbf24">★★★☆☆</text>
  <text x="720" y="483" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Budget Option</text>
  <text x="720" y="505" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">$3 first mo</text>
  <text x="720" y="530" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Good for testing</text>
  <text x="720" y="550" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Limited features</text>

  <!-- Card 5: Self-hosted -->
  <rect x="820" y="370" width="168" height="190" rx="14" fill="url(#card2)" stroke="#27272a" stroke-width="1"/>
  <text x="904" y="412" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#71717a">#5</text>
  <text x="904" y="435" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Self-Hosted</text>
  <text x="904" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#fbbf24">★★★★★</text>
  <text x="904" y="483" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Full Control</text>
  <text x="904" y="505" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#a1a1aa">~$10/mo VPS</text>
  <text x="904" y="530" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">Technical required</text>
  <text x="904" y="550" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#71717a">You maintain it</text>

  <!-- Decorative right side element -->
  <circle cx="1100" cy="315" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="315" r="55" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <text x="1100" y="305" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="40">🏆</text>
  <text x="1100" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">2026 Rankings</text>

  <!-- Bottom attribution -->
  <text x="600" y="612" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#3f3f46">myclawgo.com · OpenClaw Hosting Guide</text>
</svg>
