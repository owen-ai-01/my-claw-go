<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bar-self" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bar-managed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Time Investment: Self-Hosted vs Managed OpenClaw</text>
  <text x="600" y="72" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#52525b">Hours spent on infrastructure vs. using OpenClaw over 3 months</text>
  <rect x="500" y="84" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Legend -->
  <rect x="420" y="98" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="440" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#a1a1aa">Self-Hosted</text>
  <rect x="570" y="98" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="590" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#a1a1aa">Managed (MyClawGo)</text>

  <!-- Chart area -->
  <rect x="80" y="125" width="1040" height="270" rx="12" fill="#0f0f11" stroke="#1f1f23" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="70" y="165" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#52525b">8h</text>
  <text x="70" y="215" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#52525b">6h</text>
  <text x="70" y="265" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#52525b">4h</text>
  <text x="70" y="315" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#52525b">2h</text>
  <text x="70" y="365" text-anchor="end" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#52525b">0h</text>

  <!-- Grid lines -->
  <line x1="85" y1="160" x2="1115" y2="160" stroke="#1f1f23" stroke-width="1"/>
  <line x1="85" y1="210" x2="1115" y2="210" stroke="#1f1f23" stroke-width="1"/>
  <line x1="85" y1="260" x2="1115" y2="260" stroke="#1f1f23" stroke-width="1"/>
  <line x1="85" y1="310" x2="1115" y2="310" stroke="#1f1f23" stroke-width="1"/>
  <line x1="85" y1="360" x2="1115" y2="360" stroke="#27272a" stroke-width="1.5"/>

  <!-- Group 1: Initial Setup -->
  <text x="210" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">Initial Setup</text>
  <!-- Self: 6 hours = 150px height (from y=360, upward) -->
  <rect x="145" y="210" width="75" height="150" rx="6" fill="url(#bar-self)" opacity="0.9"/>
  <text x="182" y="200" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ef4444">6h</text>
  <!-- Managed: 0.1h ≈ 3px -->
  <rect x="230" y="357" width="75" height="3" rx="2" fill="url(#bar-managed)"/>
  <text x="267" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#22c55e">~5 min</text>

  <!-- Group 2: Monthly Maintenance -->
  <text x="470" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">Monthly Maintenance</text>
  <!-- Self: 1h = 25px -->
  <rect x="405" y="335" width="75" height="25" rx="6" fill="url(#bar-self)" opacity="0.9"/>
  <text x="442" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ef4444">1h</text>
  <!-- Managed: 0 -->
  <rect x="490" y="358" width="75" height="2" rx="2" fill="#27272a"/>
  <text x="527" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#22c55e">0h</text>

  <!-- Group 3: One Incident -->
  <text x="730" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">One Incident</text>
  <!-- Self: 2h = 50px -->
  <rect x="665" y="310" width="75" height="50" rx="6" fill="url(#bar-self)" opacity="0.9"/>
  <text x="702" y="300" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ef4444">2h</text>
  <!-- Managed: 0 (provider handles) -->
  <rect x="750" y="358" width="75" height="2" rx="2" fill="#27272a"/>
  <text x="787" y="348" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#22c55e">0h</text>

  <!-- Group 4: 3-Month Total -->
  <text x="990" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#71717a">3-Month Total</text>
  <!-- Self: 8h = 200px, but cap at chart height -->
  <rect x="925" y="135" width="75" height="225" rx="6" fill="url(#bar-self)" opacity="0.9"/>
  <text x="962" y="125" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ef4444">~10h</text>
  <!-- Managed: 0.1h -->
  <rect x="1010" y="355" width="75" height="5" rx="3" fill="url(#bar-managed)"/>
  <text x="1047" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#22c55e">&lt;30 min</text>

  <!-- Bottom summary -->
  <rect x="80" y="406" width="1040" height="58" rx="12" fill="#111113" stroke="#27272a" stroke-width="1"/>
  <text x="360" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Self-hosted time investment over 3 months</text>
  <text x="360" y="452" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ef4444">~10 hours of infrastructure work</text>
  <line x1="720" y1="415" x2="720" y2="455" stroke="#27272a" stroke-width="1"/>
  <text x="890" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717a">Managed hosting time investment</text>
  <text x="890" y="452" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#22c55e">~5 minutes total</text>
</svg>
