<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs><clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath></defs>
  <g clip-path="url(#c)">
    <rect width="200" height="200" fill="#ffdfbf"/>
    <!-- Clothing (suit) -->
    <ellipse cx="100" cy="232" rx="88" ry="68" fill="#2d2d3a"/>
    <!-- Tie -->
    <ellipse cx="100" cy="210" rx="18" ry="28" fill="#f0f0f0"/>
    <rect x="97" y="188" width="6" height="26" rx="3" fill="#3a3a8a"/>
    <!-- Neck -->
    <rect x="87" y="154" width="26" height="38" rx="5" fill="#ffe8d0"/>
    <!-- Face -->
    <ellipse cx="100" cy="118" rx="43" ry="52" fill="#ffe8d0"/>
    <!-- Gray hair (thinner on top) -->
    <ellipse cx="100" cy="74" rx="44" ry="22" fill="#b0b0b0"/>
    <!-- Hair receding (temples visible) -->
    <ellipse cx="67" cy="82" rx="14" ry="10" fill="#ffe8d0"/>
    <ellipse cx="133" cy="82" rx="14" ry="10" fill="#ffe8d0"/>
    <!-- Hair sides (gray) -->
    <ellipse cx="59" cy="96" rx="9" ry="20" fill="#b0b0b0"/>
    <ellipse cx="141" cy="96" rx="9" ry="20" fill="#b0b0b0"/>
    <!-- Sideburns (gray) -->
    <rect x="57" y="112" width="7" height="20" rx="3" fill="#a8a8a8"/>
    <rect x="136" y="112" width="7" height="20" rx="3" fill="#a8a8a8"/>
    <!-- Wrinkle hints -->
    <path d="M 70 115 Q 72 119 70 123" stroke="#d8b898" stroke-width="1.2" fill="none" opacity="0.65"/>
    <path d="M 130 115 Q 128 119 130 123" stroke="#d8b898" stroke-width="1.2" fill="none" opacity="0.65"/>
    <path d="M 82 108 Q 84 105 86 108" stroke="#d8b898" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 114 108 Q 116 105 118 108" stroke="#d8b898" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Eyebrows (gray, bushy) -->
    <path d="M 73 107 Q 84 103 93 106" stroke="#909090" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 107 106 Q 116 103 127 107" stroke="#909090" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="84" cy="117" rx="8" ry="8" fill="white"/>
    <ellipse cx="116" cy="117" rx="8" ry="8" fill="white"/>
    <circle cx="84" cy="118" r="5" fill="#3a2a1a"/>
    <circle cx="116" cy="118" r="5" fill="#3a2a1a"/>
    <circle cx="86" cy="116" r="2" fill="white"/>
    <circle cx="118" cy="116" r="2" fill="white"/>
    <!-- Glasses (rectangular frames) -->
    <rect x="71" y="109" width="28" height="17" rx="4" fill="none" stroke="#5a4030" stroke-width="2.2"/>
    <rect x="101" y="109" width="28" height="17" rx="4" fill="none" stroke="#5a4030" stroke-width="2.2"/>
    <line x1="99" y1="117" x2="101" y2="117" stroke="#5a4030" stroke-width="2.2"/>
    <!-- Temple arms -->
    <line x1="71" y1="117" x2="58" y2="117" stroke="#5a4030" stroke-width="2.2"/>
    <line x1="129" y1="117" x2="142" y2="117" stroke="#5a4030" stroke-width="2.2"/>
    <!-- Nose -->
    <path d="M 96 134 Q 93 145 97 149 Q 100 151 103 149 Q 107 145 104 134" stroke="#d0a080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Mouth (wise smile) -->
    <path d="M 88 153 Q 100 162 112 153" stroke="#a07060" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <!-- Gray stubble -->
    <ellipse cx="100" cy="163" rx="26" ry="9" fill="#a0a0a0" opacity="0.1"/>
  </g>
</svg>
