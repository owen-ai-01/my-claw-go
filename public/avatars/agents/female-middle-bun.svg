    <circle cx="86" cy="114" r="2" fill="white"/>
    <circle cx="118" cy="114" r="2" fill="white"/>
    <!-- Eyelashes -->
    <path d="M 77 110 L 74 106" stroke="#1a1a3a" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 84 108 L 84 104" stroke="#1a1a3a" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 91 110 L 94 106" stroke="#1a1a3a" stroke-width="1.3" stroke-linecap="round"/>
