    <path d="M 91 110 L 94 106" stroke="#2d1a0e" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 109 110 L 106 106" stroke="#2d1a0e" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 116 108 L 116 104" stroke="#2d1a0e" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 123 110 L 126 106" stroke="#2d1a0e" stroke-width="1.3" stroke-linecap="round"/>
