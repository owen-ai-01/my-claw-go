<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs><clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath></defs>
  <g clip-path="url(#c)">
    <rect width="200" height="200" fill="#b5ead7"/>
    <!-- Clothing -->
    <ellipse cx="100" cy="232" rx="88" ry="68" fill="#2a4a38"/>
    <!-- Neck -->
    <rect x="87" y="155" width="26" height="38" rx="5" fill="#fddbb4"/>
    <!-- Face -->
    <ellipse cx="100" cy="118" rx="43" ry="52" fill="#fddbb4"/>
    <!-- Caesar cut hair (flat, short, textured) -->
    <ellipse cx="100" cy="74" rx="46" ry="22" fill="#2d1a0e"/>
    <!-- Hair texture lines (caesar style) -->
    <path d="M 64 72 Q 80 68 100 68 Q 120 68 136 72" stroke="#1a0e08" stroke-width="1.8" fill="none"/>
    <path d="M 66 78 Q 82 74 100 74 Q 118 74 134 78" stroke="#1a0e08" stroke-width="1.5" fill="none"/>
    <!-- Hair sides (very short/faded) -->
    <ellipse cx="59" cy="90" rx="8" ry="16" fill="#2d1a0e"/>
    <ellipse cx="141" cy="90" rx="8" ry="16" fill="#2d1a0e"/>
    <!-- Sideburns -->
    <rect x="57" y="104" width="7" height="20" rx="3" fill="#2d1a0e"/>
    <rect x="136" y="104" width="7" height="20" rx="3" fill="#2d1a0e"/>
    <!-- Eyebrows (strong, defined) -->
    <path d="M 73 106 Q 84 102 94 105" stroke="#2d1a0e" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <path d="M 106 105 Q 116 102 127 106" stroke="#2d1a0e" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="84" cy="116" rx="8" ry="8" fill="white"/>
    <ellipse cx="116" cy="116" rx="8" ry="8" fill="white"/>
    <circle cx="84" cy="117" r="5" fill="#2d1a0e"/>
    <circle cx="116" cy="117" r="5" fill="#2d1a0e"/>
    <circle cx="86" cy="115" r="2" fill="white"/>
    <circle cx="118" cy="115" r="2" fill="white"/>
    <!-- Nose -->
    <path d="M 96 133 Q 93 144 97 148 Q 100 150 103 148 Q 107 144 104 133" stroke="#e0a882" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M 88 152 Q 100 162 112 152" stroke="#b06050" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Light beard -->
    <ellipse cx="100" cy="163" rx="28" ry="10" fill="#2d1a0e" opacity="0.1"/>
  </g>
</svg>
